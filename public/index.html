<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Device Verification</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0d0f1a;
  --card:#161929;
  --border:rgba(255,255,255,0.06);
  --accent:#00e5c0;
  --accent2:#7b6ef6;
  --success:#00e5c0;
  --danger:#ff4d6d;
  --warn:#ffbe0b;
  --text:#e8eaf6;
  --muted:#6b7499;
  --font:'Inter',sans-serif;
  --font2:'Poppins',sans-serif;
}
html,body{
  height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:var(--font);
  overflow:hidden;
}

/* BG */
.bg-wrap{
  position:fixed;inset:0;z-index:0;
  background:linear-gradient(160deg,#0d0f1a 0%,#11152a 60%,#180d2e 100%);
}
.bg-wrap::after{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse 60% 40% at 50% 100%,rgba(123,110,246,0.18) 0%,transparent 70%),
    radial-gradient(ellipse 40% 30% at 80% 10%,rgba(0,229,192,0.08) 0%,transparent 60%);
}

/* WRAP */
.wrap{
  position:relative;z-index:2;
  height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:24px;
}

/* CARD */
.card{
  width:100%;max-width:360px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:28px;
  padding:44px 28px 36px;
  text-align:center;
  position:relative;
  animation:cardIn .6s cubic-bezier(.16,1,.3,1) forwards;
  opacity:0;transform:translateY(24px);
  box-shadow:0 24px 80px rgba(0,0,0,0.5);
}
@keyframes cardIn{to{opacity:1;transform:translateY(0)}}

/* LOADER RING */
.loader-wrap{
  width:110px;height:110px;
  margin:0 auto 28px;
  position:relative;
  display:flex;align-items:center;justify-content:center;
}
.ring-svg{
  position:absolute;inset:0;
  width:100%;height:100%;
  transform:rotate(-90deg);
}
.ring-track{
  fill:none;
  stroke:rgba(255,255,255,0.06);
  stroke-width:3;
}
.ring-fill{
  fill:none;
  stroke:url(#ringGrad);
  stroke-width:3;
  stroke-linecap:round;
  stroke-dasharray:283;
  stroke-dashoffset:283;
  transition:stroke-dashoffset .6s cubic-bezier(.4,0,.2,1);
}
.ring-icon{
  font-size:36px;
  position:relative;z-index:1;
  transition:all .4s;
}

/* TITLE */
.main-title{
  font-family:var(--font2);
  font-size:22px;font-weight:700;
  color:var(--accent);
  margin-bottom:8px;
  transition:color .4s;
  line-height:1.2;
}
.main-sub{
  font-size:13px;
  color:var(--muted);
  margin-bottom:32px;
  min-height:20px;
  transition:all .3s;
}

/* STATUS STEPS - minimal dots */
.dots-row{
  display:flex;align-items:center;justify-content:center;
  gap:8px;
  margin-bottom:28px;
}
.dot{
  width:8px;height:8px;
  border-radius:50%;
  background:rgba(255,255,255,0.1);
  transition:all .4s;
}
.dot.active{
  background:var(--accent2);
  box-shadow:0 0 10px rgba(123,110,246,0.6);
  transform:scale(1.3);
}
.dot.done{
  background:var(--accent);
  box-shadow:0 0 8px rgba(0,229,192,0.4);
}
.dot.error{
  background:var(--danger);
}

/* STATUS TEXT */
.status-txt{
  font-size:12px;
  color:var(--muted);
  font-family:monospace;
  margin-bottom:28px;
  min-height:18px;
  transition:all .3s;
  letter-spacing:.3px;
}

/* RESULT AREA */
.result-area{
  display:none;
  margin-bottom:24px;
}
.result-area.show{display:block}
.result-msg{
  font-size:12px;
  line-height:1.8;
  opacity:.7;
  font-family:monospace;
  white-space:pre-line;
}

/* BUTTON */
.btn-proceed{
  display:none;
  width:100%;
  padding:15px;
  border-radius:16px;
  border:none;
  cursor:pointer;
  font-family:var(--font2);
  font-size:15px;font-weight:700;
  letter-spacing:.2px;
  position:relative;overflow:hidden;
  transition:transform .15s, box-shadow .15s;
  margin-bottom:0;
}
.btn-proceed.show{display:block}
.btn-proceed.ok{
  background:linear-gradient(135deg,#00e5c0,#0072ff);
  color:#fff;
  box-shadow:0 6px 28px rgba(0,229,192,0.3);
}
.btn-proceed.warn{
  background:linear-gradient(135deg,#ffbe0b,#fb8500);
  color:#000;
  box-shadow:0 6px 28px rgba(255,190,11,0.3);
}
.btn-proceed.bad{
  background:linear-gradient(135deg,#ff4d6d,#c9184a);
  color:#fff;
  box-shadow:0 6px 28px rgba(255,77,109,0.3);
}
.btn-proceed::before{
  content:'';position:absolute;
  top:0;left:-100%;width:100%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent);
  animation:btnShimmer 2.5s ease-in-out infinite;
}
@keyframes btnShimmer{to{left:200%}}
.btn-proceed:active{transform:scale(.97)}

/* POWERED */
.powered{
  margin-top:24px;
  font-size:11px;
  color:var(--muted);
  opacity:.5;
  letter-spacing:.5px;
}
.powered b{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  font-weight:700;
}
</style>
</head>
<body>

<div class="bg-wrap"></div>

<div class="wrap">
  <div class="card">

    <!-- RING LOADER -->
    <div class="loader-wrap">
      <svg class="ring-svg" viewBox="0 0 100 100">
        <defs>
          <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#7b6ef6"/>
            <stop offset="100%" stop-color="#00e5c0"/>
          </linearGradient>
        </defs>
        <circle class="ring-track" cx="50" cy="50" r="45"/>
        <circle class="ring-fill" id="ringFill" cx="50" cy="50" r="45"/>
      </svg>
      <div class="ring-icon" id="ringIcon">🔐</div>
    </div>

    <div class="main-title" id="mainTitle">Device Verification</div>
    <div class="main-sub" id="mainSub">Inspecting Your Device...</div>

    <!-- DOTS -->
    <div class="dots-row">
      <div class="dot active" id="dot1"></div>
      <div class="dot" id="dot2"></div>
      <div class="dot" id="dot3"></div>
      <div class="dot" id="dot4"></div>
    </div>

    <div class="status-txt" id="statusTxt">Initializing...</div>

    <div class="result-area" id="resultArea">
      <div class="result-msg" id="resultMsg"></div>
    </div>

    <button class="btn-proceed" id="btnProceed" onclick="continueTgBot()">
      Proceed to Bot →
    </button>

  </div>

  <div class="powered">© 2026 Powered by <b>NEXO</b></div>
</div>

<script>
const sleep = ms => new Promise(r => setTimeout(r, ms));

// Ring progress 0-100
function setRing(pct) {
  const circ = 2 * Math.PI * 45; // 282.7
  const offset = circ - (pct / 100) * circ;
  document.getElementById('ringFill').style.strokeDashoffset = offset;
}

function setDot(id, state) {
  document.getElementById('dot' + id).className = 'dot ' + state;
}

function setStatus(txt) {
  document.getElementById('statusTxt').textContent = txt;
}

function setTitle(t, s) {
  document.getElementById('mainTitle').textContent = t;
  if (s !== undefined) document.getElementById('mainSub').textContent = s;
}

function setIcon(emoji) {
  document.getElementById('ringIcon').textContent = emoji;
}

function showResult(msg) {
  const a = document.getElementById('resultArea');
  document.getElementById('resultMsg').textContent = msg;
  a.className = 'result-area show';
}

function showBtn(type) {
  const b = document.getElementById('btnProceed');
  b.className = 'btn-proceed show ' + type;
}

function setTitleColor(color) {
  document.getElementById('mainTitle').style.color = color;
}

function continueTgBot() {
  const tg = window.Telegram?.WebApp;
  if (tg) tg.close();
  else window.close();
}

function getCanvasHash() {
  try {
    const c = document.createElement('canvas');
    const ctx = c.getContext('2d');
    ctx.textBaseline = 'top';
    ctx.font = '14px Arial';
    ctx.fillStyle = '#f60';
    ctx.fillRect(125, 1, 62, 20);
    ctx.fillStyle = '#069';
    ctx.fillText('Secure check', 2, 15);
    ctx.fillStyle = 'rgba(102,204,0,0.7)';
    ctx.fillText('Secure check', 4, 17);
    const data = c.toDataURL();
    let h = 0x811c9dc5;
    for (let i = 0; i < data.length; i++) {
      h ^= data.charCodeAt(i);
      h = (h * 0x01000193) >>> 0;
    }
    return h.toString(36);
  } catch { return 'c0'; }
}

function getWebGL() {
  try {
    const c = document.createElement('canvas');
    const gl = c.getContext('webgl') || c.getContext('experimental-webgl');
    if (!gl) return 'nogl';
    const dbg = gl.getExtension('WEBGL_debug_renderer_info');
    const renderer = dbg ? gl.getParameter(dbg.UNMASKED_RENDERER_WEBGL) : 'unknown';
    const vendor   = dbg ? gl.getParameter(dbg.UNMASKED_VENDOR_WEBGL)   : 'unknown';
    return renderer + '|' + vendor;
  } catch { return 'gl0'; }
}

function getFingerprint(botusername) {
  const n = navigator;
  const raw = [
    n.userAgent,
    screen.width + 'x' + screen.height,
    n.hardwareConcurrency || 0,
    n.platform || '',
    n.deviceMemory || 0,
    getCanvasHash(),
    getWebGL(),
    botusername
  ].join('||');
  let h = 0x811c9dc5;
  for (let i = 0; i < raw.length; i++) {
    h ^= raw.charCodeAt(i);
    h = (h * 0x01000193) >>> 0;
  }
  return h.toString(36) + raw.length.toString(36);
}

async function run() {
  const tg = window.Telegram?.WebApp;
  if (tg) { tg.ready(); tg.expand(); }

  const p           = new URLSearchParams(window.location.search);
  const botusername = p.get('botusername') || '';
  const bottoken    = p.get('bottoken')    || '';
  const webhook     = p.get('webhook')     || '';
  const hash        = p.get('hash')        || '';

  await sleep(400);

  // STEP 1 - Telegram ID
  setDot(1, 'active');
  setStatus('Reading Telegram session...');
  setRing(15);
  await sleep(800);

  const tg_id = tg?.initDataUnsafe?.user?.id;
  if (!tg_id) {
    setDot(1, 'error');
    setIcon('🚫');
    setTitle('Access Denied', 'Open via Telegram only');
    setTitleColor('var(--danger)');
    setStatus('Telegram session not found');
    showResult('Please open this page\nthrough the Telegram bot.');
    showBtn('bad');
    setRing(100);
    return;
  }
  setDot(1, 'done');
  setRing(30);
  await sleep(300);

  // STEP 2 - Fingerprint
  setDot(2, 'active');
  setStatus('Scanning device hardware...');
  setRing(45);
  await sleep(900);
  const browser_id = getFingerprint(botusername);
  setDot(2, 'done');
  setRing(60);
  await sleep(300);

  // STEP 3 - API
  setDot(3, 'active');
  setStatus('Connecting to server...');
  setRing(70);
  await sleep(500);

  let result = null;
  try {
    const url =
      `https://web-gamma-nine-4zz7ga4k5p.vercel.app/api` +
      `?botusername=${encodeURIComponent(botusername)}` +
      `&bottoken=${encodeURIComponent(bottoken)}` +
      `&tg_id=${tg_id}` +
      `&browser_id=${browser_id}` +
      `&hash=${encodeURIComponent(hash)}` +
      `&webhook=${encodeURIComponent(webhook)}`;

    const resp = await fetch(url);
    result = await resp.json();
  } catch (e) {
    setDot(3, 'error');
    setIcon('❌');
    setTitle('Server Error', 'Could not reach server');
    setTitleColor('var(--danger)');
    setStatus('Connection failed');
    showResult('Could not reach the server.\nPlease try again.');
    showBtn('bad');
    setRing(100);
    return;
  }

  setDot(3, 'done');
  setRing(85);
  await sleep(400);

  // STEP 4 - Done
  setDot(4, 'active');
  setStatus('Notifying bot...');
  await sleep(700);
  setDot(4, 'done');
  setRing(100);
  await sleep(400);

  // RESULT
  const status  = result?.status  || 'fail';
  const message = result?.message || '';

  if (status === 'pass' && message === 'Verified Successfully') {
    setIcon('✅');
    setTitle('Verified!', 'This account is now verified.');
    setTitleColor('var(--success)');
    setStatus('Identity confirmed successfully');
    showResult('Your access has been unlocked.\nWelcome aboard!');
    showBtn('ok');

  } else if (status === 'pass' && message === 'Already Verified') {
    setIcon('✅');
    setTitle('Already Verified', 'This account is already verified.');
    setTitleColor('var(--success)');
    setStatus('Session restored successfully');
    showResult('Your session is active.\nReturning to bot...');
    showBtn('ok');

  } else if (status === 'fail' && message === 'Device already used') {
    setIcon('⚠️');
    setTitle('Device Detected', 'This device is linked to another account.');
    setTitleColor('var(--warn)');
    setStatus('Same device detected');
    showResult('You can still use the bot.\nBut multi-account is not allowed.');
    showBtn('warn');

  } else if (status === 'fail' && message === 'VPN Detected') {
    setIcon('🚫');
    setTitle('VPN Blocked', 'VPN or Proxy detected.');
    setTitleColor('var(--danger)');
    setStatus('VPN detected on your connection');
    showResult('Please turn off your VPN\nand try again.');
    showBtn('bad');

  } else if (status === 'fail' && message === 'Permanently Blocked') {
    setIcon('🔴');
    setTitle('Blocked', 'Your access has been revoked.');
    setTitleColor('var(--danger)');
    setStatus('Access permanently revoked');
    showResult('Contact support for help.');
    showBtn('bad');

  } else {
    setIcon('❌');
    setTitle('Failed', 'Verification failed.');
    setTitleColor('var(--danger)');
    setStatus('Something went wrong');
    showResult(message || 'Please try again.');
    showBtn('bad');
  }
}

window.addEventListener('load', run);
</script>
</body>
                                                      </html>
