<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Secure Verification</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f0c29;
  --bg2:#1a1042;
  --card:rgba(255,255,255,0.04);
  --border:rgba(255,255,255,0.08);
  --accent:#a78bfa;
  --accent2:#818cf8;
  --accent3:#38bdf8;
  --success:#34d399;
  --danger:#f87171;
  --warn:#fbbf24;
  --text:#f1f5f9;
  --muted:#94a3b8;
  --font:'Inter',sans-serif;
  --font2:'Poppins',sans-serif;
}
html,body{
  height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:var(--font);
  overflow:hidden;
}

/* ── ANIMATED BG ── */
.bg-wrap{
  position:fixed;inset:0;z-index:0;
  background:linear-gradient(135deg,#0f0c29 0%,#302b63 50%,#24243e 100%);
  overflow:hidden;
}
.bg-wrap::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse 80% 50% at 20% 20%,rgba(167,139,250,0.15) 0%,transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 80%,rgba(56,189,248,0.12) 0%,transparent 60%);
  animation:bgShift 8s ease-in-out infinite alternate;
}
@keyframes bgShift{
  0%{opacity:1;transform:scale(1)}
  100%{opacity:.7;transform:scale(1.05)}
}

/* ── FLOATING ORBS ── */
.orb{
  position:fixed;border-radius:50%;
  filter:blur(60px);pointer-events:none;
  animation:orbFloat linear infinite;
}
.orb1{width:300px;height:300px;background:rgba(167,139,250,0.12);top:-80px;left:-80px;animation-duration:20s}
.orb2{width:250px;height:250px;background:rgba(56,189,248,0.1);bottom:-60px;right:-60px;animation-duration:25s;animation-direction:reverse}
.orb3{width:150px;height:150px;background:rgba(129,140,248,0.15);top:50%;left:50%;animation-duration:15s}
@keyframes orbFloat{
  0%{transform:translate(0,0) rotate(0deg)}
  25%{transform:translate(30px,-20px) rotate(90deg)}
  50%{transform:translate(-20px,30px) rotate(180deg)}
  75%{transform:translate(20px,20px) rotate(270deg)}
  100%{transform:translate(0,0) rotate(360deg)}
}

/* ── GRID ── */
.grid{
  position:fixed;inset:0;z-index:0;
  background-image:
    linear-gradient(rgba(167,139,250,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(167,139,250,0.03) 1px,transparent 1px);
  background-size:50px 50px;
}

/* ── WRAP ── */
.wrap{
  position:relative;z-index:2;
  height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:20px;
}

/* ── CARD ── */
.card{
  width:100%;max-width:380px;
  background:var(--card);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border:1px solid var(--border);
  border-radius:24px;
  padding:32px 28px 28px;
  position:relative;
  animation:cardIn .7s cubic-bezier(.16,1,.3,1) forwards;
  opacity:0;transform:translateY(30px) scale(.97);
}
@keyframes cardIn{to{opacity:1;transform:translateY(0) scale(1)}}

/* Top shimmer */
.card::before{
  content:'';position:absolute;
  top:0;left:10%;right:10%;height:1px;
  background:linear-gradient(90deg,transparent,var(--accent),var(--accent3),transparent);
  border-radius:1px;
  animation:shimmerLine 3s ease-in-out infinite;
}
@keyframes shimmerLine{
  0%,100%{opacity:.5;left:10%;right:10%}
  50%{opacity:1;left:5%;right:5%}
}

/* ── LOGO AREA ── */
.logo-area{
  display:flex;flex-direction:column;
  align-items:center;
  margin-bottom:28px;
  text-align:center;
}
.logo-ring{
  width:72px;height:72px;
  border-radius:50%;
  background:linear-gradient(135deg,rgba(167,139,250,0.2),rgba(56,189,248,0.2));
  border:1.5px solid rgba(167,139,250,0.3);
  display:flex;align-items:center;justify-content:center;
  font-size:28px;
  margin-bottom:14px;
  position:relative;
  transition:all .4s;
}
.logo-ring::before{
  content:'';position:absolute;inset:-6px;
  border-radius:50%;
  border:1px solid rgba(167,139,250,0.15);
  animation:ringPulse 2s ease-in-out infinite;
}
.logo-ring::after{
  content:'';position:absolute;inset:-12px;
  border-radius:50%;
  border:1px solid rgba(167,139,250,0.07);
  animation:ringPulse 2s ease-in-out infinite .4s;
}
@keyframes ringPulse{
  0%,100%{transform:scale(1);opacity:1}
  50%{transform:scale(1.08);opacity:.5}
}
.logo-ring.success-ring{
  background:linear-gradient(135deg,rgba(52,211,153,0.2),rgba(52,211,153,0.1));
  border-color:rgba(52,211,153,0.4);
}
.logo-ring.fail-ring{
  background:linear-gradient(135deg,rgba(248,113,113,0.2),rgba(248,113,113,0.1));
  border-color:rgba(248,113,113,0.4);
}
.logo-ring.warn-ring{
  background:linear-gradient(135deg,rgba(251,191,36,0.2),rgba(251,191,36,0.1));
  border-color:rgba(251,191,36,0.4);
}
.logo-title{
  font-family:var(--font2);
  font-size:18px;font-weight:700;
  background:linear-gradient(135deg,var(--accent),var(--accent3));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  margin-bottom:4px;
}
.logo-sub{
  font-size:12px;color:var(--muted);
  letter-spacing:.5px;
}

/* ── STEPS ── */
.steps{margin-bottom:20px}
.step{
  display:flex;align-items:center;
  gap:12px;padding:10px 14px;
  border-radius:12px;
  margin-bottom:6px;
  border:1px solid transparent;
  transition:all .3s;
  background:transparent;
}
.step.active{
  background:rgba(167,139,250,0.06);
  border-color:rgba(167,139,250,0.15);
}
.step.done{
  background:rgba(52,211,153,0.05);
  border-color:rgba(52,211,153,0.12);
}
.step.error{
  background:rgba(248,113,113,0.05);
  border-color:rgba(248,113,113,0.12);
}
.step-icon{
  width:32px;height:32px;flex-shrink:0;
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:600;
  border:1.5px solid rgba(255,255,255,0.08);
  background:rgba(255,255,255,0.04);
  color:var(--muted);
  transition:all .3s;
}
.step.active .step-icon{
  border-color:var(--accent);
  background:rgba(167,139,250,0.12);
  color:var(--accent);
  box-shadow:0 0 12px rgba(167,139,250,0.2);
  animation:iconPulse 1s ease-in-out infinite;
}
@keyframes iconPulse{
  0%,100%{box-shadow:0 0 12px rgba(167,139,250,0.2)}
  50%{box-shadow:0 0 20px rgba(167,139,250,0.4)}
}
.step.done .step-icon{
  border-color:var(--success);
  background:rgba(52,211,153,0.12);
  color:var(--success);
}
.step.error .step-icon{
  border-color:var(--danger);
  background:rgba(248,113,113,0.12);
  color:var(--danger);
}
.step-text{flex:1}
.step-name{
  font-size:13px;font-weight:500;
  color:var(--muted);transition:color .3s;
}
.step.active .step-name{color:var(--text)}
.step.done .step-name{color:var(--success)}
.step.error .step-name{color:var(--danger)}
.step-desc{
  font-size:11px;color:var(--muted);
  margin-top:1px;opacity:0;
  transition:opacity .3s;
  font-family:monospace;
}
.step.active .step-desc,.step.done .step-desc,.step.error .step-desc{opacity:.6}

/* ── PROGRESS ── */
.prog-wrap{
  height:3px;
  background:rgba(255,255,255,0.06);
  border-radius:99px;
  margin-bottom:16px;
  overflow:hidden;
}
.prog-fill{
  height:100%;
  border-radius:99px;
  background:linear-gradient(90deg,var(--accent2),var(--accent),var(--accent3));
  width:0%;
  transition:width .5s cubic-bezier(.4,0,.2,1);
  position:relative;overflow:hidden;
}
.prog-fill::after{
  content:'';position:absolute;
  top:0;left:-100%;width:100%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.4),transparent);
  animation:progShimmer 1.5s ease-in-out infinite;
}
@keyframes progShimmer{to{left:200%}}

/* ── STATUS ── */
.status{
  display:flex;align-items:center;gap:10px;
  padding:12px 14px;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:12px;
  font-size:13px;color:var(--muted);
  transition:all .3s;
  min-height:46px;
}
.status.ok{border-color:rgba(52,211,153,0.2);background:rgba(52,211,153,0.04);color:var(--success)}
.status.bad{border-color:rgba(248,113,113,0.2);background:rgba(248,113,113,0.04);color:var(--danger)}
.status.war{border-color:rgba(251,191,36,0.2);background:rgba(251,191,36,0.04);color:var(--warn)}
.s-dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--muted);flex-shrink:0;
  transition:background .3s;
}
.status .s-dot{animation:dotBlink .8s ease-in-out infinite}
.status.ok .s-dot{background:var(--success);animation:none}
.status.bad .s-dot{background:var(--danger);animation:none}
.status.war .s-dot{background:var(--warn);animation:none}
@keyframes dotBlink{0%,100%{opacity:1}50%{opacity:.2}}

/* ── RESULT ── */
.result{
  display:none;
  margin-top:14px;
  border-radius:16px;
  padding:20px;
  text-align:center;
  animation:cardIn .4s ease forwards;
}
.result.show{display:block}
.r-emoji{font-size:36px;margin-bottom:10px;display:block}
.r-title{
  font-family:var(--font2);
  font-size:16px;font-weight:700;
  margin-bottom:6px;
}
.r-desc{
  font-size:12px;line-height:1.7;
  opacity:.75;font-family:monospace;
  white-space:pre-line;
}
.result.ok{background:rgba(52,211,153,0.07);border:1px solid rgba(52,211,153,0.2);color:var(--success)}
.result.bad{background:rgba(248,113,113,0.07);border:1px solid rgba(248,113,113,0.2);color:var(--danger)}
.result.war{background:rgba(251,191,36,0.07);border:1px solid rgba(251,191,36,0.2);color:var(--warn)}

/* ── POWERED BY ── */
.powered{
  margin-top:20px;
  text-align:center;
  font-size:11px;
  color:var(--muted);
  opacity:.4;
  letter-spacing:.5px;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.powered span{
  background:linear-gradient(135deg,var(--accent),var(--accent3));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  font-weight:600;opacity:1;
}
</style>
</head>
<body>

<div class="bg-wrap"></div>
<div class="grid"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div class="wrap">
  <div class="card">

    <div class="logo-area">
      <div class="logo-ring" id="logoRing">🛡️</div>
      <div class="logo-title" id="mainTitle">Secure Verification</div>
      <div class="logo-sub">Checking your identity...</div>
    </div>

    <div class="steps">
      <div class="step active" id="s1">
        <div class="step-icon">①</div>
        <div class="step-text">
          <div class="step-name">Telegram Identity</div>
          <div class="step-desc" id="d1">Reading session data...</div>
        </div>
      </div>
      <div class="step" id="s2">
        <div class="step-icon">②</div>
        <div class="step-text">
          <div class="step-name">Device Fingerprint</div>
          <div class="step-desc" id="d2">Generating unique key...</div>
        </div>
      </div>
      <div class="step" id="s3">
        <div class="step-icon">③</div>
        <div class="step-text">
          <div class="step-name">Server Check</div>
          <div class="step-desc" id="d3">Verifying credentials...</div>
        </div>
      </div>
      <div class="step" id="s4">
        <div class="step-icon">④</div>
        <div class="step-text">
          <div class="step-name">Final Dispatch</div>
          <div class="step-desc" id="d4">Notifying bot...</div>
        </div>
      </div>
    </div>

    <div class="prog-wrap">
      <div class="prog-fill" id="prog"></div>
    </div>

    <div class="status" id="statusBox">
      <div class="s-dot"></div>
      <span id="statusTxt">Initializing secure session...</span>
    </div>

    <div class="result" id="result">
      <span class="r-emoji" id="rEmoji"></span>
      <div class="r-title" id="rTitle"></div>
      <div class="r-desc" id="rDesc"></div>
    </div>

    <div class="powered">
      Powered by <span>Ravi X Nexo Wallet</span>
    </div>

  </div>
</div>

<script>
const sleep = ms => new Promise(r => setTimeout(r, ms));

function setStep(id, state, desc) {
  const el  = document.getElementById(id);
  const ico = el.querySelector('.step-icon');
  el.className = 'step ' + state;
  if (state === 'done')  ico.textContent = '✓';
  if (state === 'error') ico.textContent = '✗';
  if (desc) document.getElementById(id.replace('s','d')).textContent = desc;
}

function setProgress(p) {
  document.getElementById('prog').style.width = p + '%';
}

function setStatus(txt, cls) {
  const b = document.getElementById('statusBox');
  b.className = 'status ' + (cls || '');
  document.getElementById('statusTxt').textContent = txt;
}

function setLogo(emoji, cls) {
  const r = document.getElementById('logoRing');
  r.textContent = emoji;
  r.className   = 'logo-ring ' + (cls || '');
}

function showResult(type, emoji, title, desc) {
  const b = document.getElementById('result');
  document.getElementById('rEmoji').textContent = emoji;
  document.getElementById('rTitle').textContent = title;
  document.getElementById('rDesc').textContent  = desc;
  b.className = 'result show ' + type;
  setLogo(emoji, type + '-ring');
}

// FNV-1a fingerprint — bot specific
function getFingerprint(botusername) {
  const n   = navigator;
  const raw = [
    n.userAgent, n.language,
    screen.width + 'x' + screen.height + 'x' + screen.colorDepth,
    new Date().getTimezoneOffset(),
    n.hardwareConcurrency || 0,
    n.deviceMemory || 0,
    n.platform || '',
    !!n.cookieEnabled,
    !!window.indexedDB,
    botusername
  ].join('||');
  let h = 0x811c9dc5;
  for (let i = 0; i < raw.length; i++) {
    h ^= raw.charCodeAt(i);
    h  = (h * 0x01000193) >>> 0;
  }
  return h.toString(36) + raw.length.toString(36);
}

async function run() {
  const tg = window.Telegram?.WebApp;
  if (tg) { tg.ready(); tg.expand(); }

  // URL params
  const p           = new URLSearchParams(window.location.search);
  const botusername = p.get('botusername') || '';
  const bottoken    = p.get('bottoken')    || '';
  const webhook     = p.get('webhook')     || '';
  const hash        = p.get('hash')        || '';

  await sleep(500);

  // ── STEP 1: Telegram ID ──
  setStep('s1', 'active', 'Reading Telegram session...');
  setProgress(10);
  await sleep(800);

  const tg_id = tg?.initDataUnsafe?.user?.id;
  if (!tg_id) {
    setStep('s1', 'error', 'Not found');
    setStatus('Open via Telegram only', 'bad');
    showResult('bad', '🚫', 'Access Denied', 'Please open this page\nthrough the Telegram bot.');
    setProgress(100); return;
  }
  setStep('s1', 'done', 'ID: ' + String(tg_id).slice(0,4) + '****');
  setProgress(25);
  await sleep(400);

  // ── STEP 2: Fingerprint ──
  setStep('s2', 'active', 'Scanning device...');
  await sleep(900);
  const browser_id = getFingerprint(botusername);
  setStep('s2', 'done', 'Key: ' + browser_id.slice(0,6) + '...');
  setProgress(50);
  await sleep(400);

  // ── STEP 3: API ──
  setStep('s3', 'active', 'Connecting to server...');
  setStatus('Verifying with secure server...', '');
  await sleep(500);

  let result = null;
  try {
    const url =
      `https://web-gamma-nine-4zz7ga4k5p.vercel.app/api` +
      `?botusername=${encodeURIComponent(botusername)}` +
      `&bottoken=${encodeURIComponent(bottoken)}` +
      `&tg_id=${tg_id}` +
      `&browser_id=${browser_id}` +
      `&hash=${encodeURIComponent(hash)}` +
      `&webhook=${encodeURIComponent(webhook)}`;

    const resp = await fetch(url);
    result     = await resp.json();
  } catch (e) {
    setStep('s3', 'error', 'Connection failed');
    setStatus('Server unreachable', 'bad');
    showResult('bad', '❌', 'Server Error', 'Could not reach the server.\nPlease try again.');
    setProgress(100); return;
  }

  setStep('s3', 'done', 'Response received');
  setProgress(75);
  await sleep(400);

  // ── STEP 4: Done ──
  setStep('s4', 'active', 'Sending to bot...');
  await sleep(700);
  setStep('s4', 'done', 'Bot notified ✓');
  setProgress(100);
  await sleep(400);

  // ── RESULT ──
  const status  = result?.status  || 'fail';
  const message = result?.message || '';

  if (status === 'pass' && message === 'Verified Successfully') {
    setStatus('Access granted!', 'ok');
    document.getElementById('mainTitle').textContent = 'Verified!';
    showResult('ok', '🎉', 'Verified Successfully', 'Identity confirmed.\nYour access has been unlocked.');
    await sleep(2500); tg?.close();

  } else if (status === 'pass' && message === 'Already Verified') {
    setStatus('Session restored', 'ok');
    document.getElementById('mainTitle').textContent = 'Welcome Back!';
    showResult('ok', '✅', 'Already Verified', 'Your session has been restored.\nReturning to bot...');
    await sleep(2500); tg?.close();

  } else if (status === 'fail' && message === 'Device already used') {
    setStatus('Same device detected', 'war');
    document.getElementById('mainTitle').textContent = 'Device Detected';
    showResult('war', '⚠️', 'Same Device', 'This device is linked to another account.\nYou can still use the bot.');

  } else if (status === 'fail' && message === 'VPN Detected') {
    setStatus('VPN detected', 'bad');
    document.getElementById('mainTitle').textContent = 'VPN Blocked';
    showResult('bad', '🚫', 'VPN Detected', 'Please turn off your VPN\nand try again.');

  } else if (status === 'fail' && message === 'Permanently Blocked') {
    setStatus('Access revoked', 'bad');
    document.getElementById('mainTitle').textContent = 'Blocked';
    showResult('bad', '🔴', 'Same Blocked', 'Your access has been revoked.\nContact support for help.');

  } else {
    setStatus('Verification failed', 'bad');
    showResult('bad', '❌', 'Failed', message || 'Something went wrong.\nPlease try again.');
  }
}

window.addEventListener('load', run);
</script>
</body>
</html>
