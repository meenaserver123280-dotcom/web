<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Secure Verification</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#080b14;
  --card:rgba(255,255,255,0.04);
  --border:rgba(255,255,255,0.07);
  --accent:#00c6ff;
  --accent2:#0072ff;
  --accent3:#7b2ff7;
  --success:#00e5a0;
  --danger:#ff4d6d;
  --warn:#ffbe0b;
  --text:#f0f4ff;
  --muted:#8895b3;
  --font:'Inter',sans-serif;
  --font2:'Poppins',sans-serif;
}
html,body{
  height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:var(--font);
  overflow:hidden;
}
.bg-wrap{
  position:fixed;inset:0;z-index:0;
  background:linear-gradient(135deg,#080b14 0%,#0d1829 50%,#0a0f1e 100%);
  overflow:hidden;
}
.bg-wrap::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse 70% 50% at 15% 20%,rgba(0,198,255,0.1) 0%,transparent 60%),
    radial-gradient(ellipse 60% 45% at 85% 80%,rgba(123,47,247,0.12) 0%,transparent 60%),
    radial-gradient(ellipse 50% 40% at 50% 50%,rgba(0,114,255,0.06) 0%,transparent 70%);
  animation:bgShift 10s ease-in-out infinite alternate;
}
@keyframes bgShift{
  0%{opacity:1;transform:scale(1)}
  100%{opacity:.8;transform:scale(1.04)}
}
.orb{
  position:fixed;border-radius:50%;
  filter:blur(70px);pointer-events:none;
  animation:orbFloat linear infinite;
}
.orb1{width:280px;height:280px;background:rgba(0,198,255,0.08);top:-60px;left:-60px;animation-duration:22s}
.orb2{width:240px;height:240px;background:rgba(123,47,247,0.09);bottom:-50px;right:-50px;animation-duration:28s;animation-direction:reverse}
.orb3{width:180px;height:180px;background:rgba(0,114,255,0.07);top:40%;left:40%;animation-duration:18s}
@keyframes orbFloat{
  0%{transform:translate(0,0) rotate(0deg)}
  25%{transform:translate(25px,-18px) rotate(90deg)}
  50%{transform:translate(-18px,25px) rotate(180deg)}
  75%{transform:translate(18px,18px) rotate(270deg)}
  100%{transform:translate(0,0) rotate(360deg)}
}
.grid{
  position:fixed;inset:0;z-index:0;
  background-image:
    linear-gradient(rgba(0,198,255,0.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,198,255,0.025) 1px,transparent 1px);
  background-size:55px 55px;
}
.wrap{
  position:relative;z-index:2;
  height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:20px;
}
.card{
  width:100%;max-width:380px;
  background:var(--card);
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  border:1px solid var(--border);
  border-radius:26px;
  padding:32px 26px 26px;
  position:relative;
  animation:cardIn .7s cubic-bezier(.16,1,.3,1) forwards;
  opacity:0;transform:translateY(30px) scale(.97);
}
@keyframes cardIn{to{opacity:1;transform:translateY(0) scale(1)}}
.card::before{
  content:'';position:absolute;
  top:0;left:12%;right:12%;height:1px;
  background:linear-gradient(90deg,transparent,var(--accent),var(--accent3),transparent);
  border-radius:1px;
  animation:shimmerLine 3s ease-in-out infinite;
}
@keyframes shimmerLine{
  0%,100%{opacity:.4;left:12%;right:12%}
  50%{opacity:1;left:6%;right:6%}
}
.logo-area{
  display:flex;flex-direction:column;
  align-items:center;
  margin-bottom:26px;
  text-align:center;
}
.logo-ring{
  width:70px;height:70px;
  border-radius:50%;
  background:linear-gradient(135deg,rgba(0,198,255,0.15),rgba(123,47,247,0.15));
  border:1.5px solid rgba(0,198,255,0.25);
  display:flex;align-items:center;justify-content:center;
  font-size:26px;
  margin-bottom:14px;
  position:relative;
  transition:all .4s;
}
.logo-ring::before{
  content:'';position:absolute;inset:-6px;
  border-radius:50%;
  border:1px solid rgba(0,198,255,0.12);
  animation:ringPulse 2s ease-in-out infinite;
}
.logo-ring::after{
  content:'';position:absolute;inset:-13px;
  border-radius:50%;
  border:1px solid rgba(0,198,255,0.05);
  animation:ringPulse 2s ease-in-out infinite .4s;
}
@keyframes ringPulse{
  0%,100%{transform:scale(1);opacity:1}
  50%{transform:scale(1.08);opacity:.4}
}
.logo-ring.success-ring{
  background:linear-gradient(135deg,rgba(0,229,160,0.2),rgba(0,229,160,0.08));
  border-color:rgba(0,229,160,0.4);
}
.logo-ring.fail-ring{
  background:linear-gradient(135deg,rgba(255,77,109,0.2),rgba(255,77,109,0.08));
  border-color:rgba(255,77,109,0.4);
}
.logo-ring.warn-ring{
  background:linear-gradient(135deg,rgba(255,190,11,0.2),rgba(255,190,11,0.08));
  border-color:rgba(255,190,11,0.4);
}
.logo-title{
  font-family:var(--font2);
  font-size:18px;font-weight:700;
  background:linear-gradient(135deg,var(--accent),var(--accent3));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  margin-bottom:4px;
}
.logo-sub{
  font-size:12px;color:var(--muted);
  letter-spacing:.4px;
}
.steps{margin-bottom:18px}
.step{
  display:flex;align-items:center;
  gap:12px;padding:9px 13px;
  border-radius:12px;
  margin-bottom:6px;
  border:1px solid transparent;
  transition:all .3s;
  background:transparent;
}
.step.active{
  background:rgba(0,198,255,0.05);
  border-color:rgba(0,198,255,0.15);
}
.step.done{
  background:rgba(0,229,160,0.04);
  border-color:rgba(0,229,160,0.12);
}
.step.error{
  background:rgba(255,77,109,0.04);
  border-color:rgba(255,77,109,0.12);
}
.step-icon{
  width:30px;height:30px;flex-shrink:0;
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:600;
  border:1.5px solid rgba(255,255,255,0.07);
  background:rgba(255,255,255,0.03);
  color:var(--muted);
  transition:all .3s;
}
.step.active .step-icon{
  border-color:var(--accent);
  background:rgba(0,198,255,0.1);
  color:var(--accent);
  box-shadow:0 0 12px rgba(0,198,255,0.2);
  animation:iconPulse 1s ease-in-out infinite;
}
@keyframes iconPulse{
  0%,100%{box-shadow:0 0 12px rgba(0,198,255,0.2)}
  50%{box-shadow:0 0 22px rgba(0,198,255,0.45)}
}
.step.done .step-icon{
  border-color:var(--success);
  background:rgba(0,229,160,0.1);
  color:var(--success);
}
.step.error .step-icon{
  border-color:var(--danger);
  background:rgba(255,77,109,0.1);
  color:var(--danger);
}
.step-text{flex:1}
.step-name{
  font-size:13px;font-weight:500;
  color:var(--muted);transition:color .3s;
}
.step.active .step-name{color:var(--text)}
.step.done .step-name{color:var(--success)}
.step.error .step-name{color:var(--danger)}
.step-desc{
  font-size:11px;color:var(--muted);
  margin-top:1px;opacity:0;
  transition:opacity .3s;
  font-family:monospace;
}
.step.active .step-desc,.step.done .step-desc,.step.error .step-desc{opacity:.55}
.prog-wrap{
  height:3px;
  background:rgba(255,255,255,0.05);
  border-radius:99px;
  margin-bottom:14px;
  overflow:hidden;
}
.prog-fill{
  height:100%;
  border-radius:99px;
  background:linear-gradient(90deg,var(--accent2),var(--accent),var(--accent3));
  width:0%;
  transition:width .5s cubic-bezier(.4,0,.2,1);
  position:relative;overflow:hidden;
}
.prog-fill::after{
  content:'';position:absolute;
  top:0;left:-100%;width:100%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.5),transparent);
  animation:progShimmer 1.5s ease-in-out infinite;
}
@keyframes progShimmer{to{left:200%}}
.status{
  display:flex;align-items:center;gap:10px;
  padding:11px 14px;
  background:rgba(255,255,255,0.02);
  border:1px solid rgba(255,255,255,0.05);
  border-radius:12px;
  font-size:13px;color:var(--muted);
  transition:all .3s;
  min-height:44px;
}
.status.ok{border-color:rgba(0,229,160,0.2);background:rgba(0,229,160,0.04);color:var(--success)}
.status.bad{border-color:rgba(255,77,109,0.2);background:rgba(255,77,109,0.04);color:var(--danger)}
.status.war{border-color:rgba(255,190,11,0.2);background:rgba(255,190,11,0.04);color:var(--warn)}
.s-dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--muted);flex-shrink:0;
  transition:background .3s;
}
.status .s-dot{animation:dotBlink .8s ease-in-out infinite}
.status.ok .s-dot{background:var(--success);animation:none}
.status.bad .s-dot{background:var(--danger);animation:none}
.status.war .s-dot{background:var(--warn);animation:none}
@keyframes dotBlink{0%,100%{opacity:1}50%{opacity:.2}}
.result{
  display:none;
  margin-top:14px;
  border-radius:16px;
  padding:18px;
  text-align:center;
  animation:cardIn .4s ease forwards;
}
.result.show{display:block}
.r-emoji{font-size:34px;margin-bottom:8px;display:block}
.r-title{
  font-family:var(--font2);
  font-size:15px;font-weight:700;
  margin-bottom:5px;
}
.r-desc{
  font-size:12px;line-height:1.7;
  opacity:.7;font-family:monospace;
  white-space:pre-line;
}
.result.ok{background:rgba(0,229,160,0.06);border:1px solid rgba(0,229,160,0.18);color:var(--success)}
.result.bad{background:rgba(255,77,109,0.06);border:1px solid rgba(255,77,109,0.18);color:var(--danger)}
.result.war{background:rgba(255,190,11,0.06);border:1px solid rgba(255,190,11,0.18);color:var(--warn)}

/* CONTINUE BUTTON */
.btn-continue{
  display:none;
  margin-top:14px;
  width:100%;
  padding:13px;
  border-radius:14px;
  border:none;
  cursor:pointer;
  font-family:var(--font2);
  font-size:14px;font-weight:700;
  letter-spacing:.3px;
  position:relative;
  overflow:hidden;
  transition:transform .2s, box-shadow .2s;
}
.btn-continue.show{display:block}
.btn-continue.ok-btn{
  background:linear-gradient(135deg,#00c6ff,#0072ff);
  color:#fff;
  box-shadow:0 4px 20px rgba(0,198,255,0.3);
}
.btn-continue.warn-btn{
  background:linear-gradient(135deg,#ffbe0b,#fb8500);
  color:#000;
  box-shadow:0 4px 20px rgba(255,190,11,0.3);
}
.btn-continue.bad-btn{
  background:linear-gradient(135deg,#ff4d6d,#c9184a);
  color:#fff;
  box-shadow:0 4px 20px rgba(255,77,109,0.3);
}
.btn-continue::before{
  content:'';position:absolute;
  top:0;left:-100%;width:100%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent);
  animation:btnShimmer 2s ease-in-out infinite;
}
@keyframes btnShimmer{to{left:200%}}
.btn-continue:active{transform:scale(.97)}
</style>
</head>
<body>

<div class="bg-wrap"></div>
<div class="grid"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div class="wrap">
  <div class="card">

    <div class="logo-area">
      <div class="logo-ring" id="logoRing">🔐</div>
      <div class="logo-title" id="mainTitle">Secure Verification</div>
      <div class="logo-sub">Checking your identity...</div>
    </div>

    <div class="steps">
      <div class="step active" id="s1">
        <div class="step-icon">①</div>
        <div class="step-text">
          <div class="step-name">Telegram Identity</div>
          <div class="step-desc" id="d1">Reading session data...</div>
        </div>
      </div>
      <div class="step" id="s2">
        <div class="step-icon">②</div>
        <div class="step-text">
          <div class="step-name">Device Fingerprint</div>
          <div class="step-desc" id="d2">Generating unique key...</div>
        </div>
      </div>
      <div class="step" id="s3">
        <div class="step-icon">③</div>
        <div class="step-text">
          <div class="step-name">Server Check</div>
          <div class="step-desc" id="d3">Verifying credentials...</div>
        </div>
      </div>
      <div class="step" id="s4">
        <div class="step-icon">④</div>
        <div class="step-text">
          <div class="step-name">Final Dispatch</div>
          <div class="step-desc" id="d4">Notifying bot...</div>
        </div>
      </div>
    </div>

    <div class="prog-wrap">
      <div class="prog-fill" id="prog"></div>
    </div>

    <div class="status" id="statusBox">
      <div class="s-dot"></div>
      <span id="statusTxt">Initializing secure session...</span>
    </div>

    <div class="result" id="result">
      <span class="r-emoji" id="rEmoji"></span>
      <div class="r-title" id="rTitle"></div>
      <div class="r-desc" id="rDesc"></div>
    </div>

    <button class="btn-continue" id="btnContinue" onclick="continueTgBot()">
      Continue to Bot →
    </button>

  </div>
</div>

<script>
const sleep = ms => new Promise(r => setTimeout(r, ms));

function setStep(id, state, desc) {
  const el  = document.getElementById(id);
  const ico = el.querySelector('.step-icon');
  el.className = 'step ' + state;
  if (state === 'done')  ico.textContent = '✓';
  if (state === 'error') ico.textContent = '✗';
  if (desc) document.getElementById(id.replace('s','d')).textContent = desc;
}

function setProgress(p) {
  document.getElementById('prog').style.width = p + '%';
}

function setStatus(txt, cls) {
  const b = document.getElementById('statusBox');
  b.className = 'status ' + (cls || '');
  document.getElementById('statusTxt').textContent = txt;
}

function setLogo(emoji, cls) {
  const r = document.getElementById('logoRing');
  r.textContent = emoji;
  r.className   = 'logo-ring ' + (cls || '');
}

function showResult(type, emoji, title, desc) {
  const b = document.getElementById('result');
  document.getElementById('rEmoji').textContent = emoji;
  document.getElementById('rTitle').textContent = title;
  document.getElementById('rDesc').textContent  = desc;
  b.className = 'result show ' + type;
  setLogo(emoji, type + '-ring');
}

function showContinueBtn(type) {
  const btn = document.getElementById('btnContinue');
  btn.className = 'btn-continue show ' + type + '-btn';
}

function continueTgBot() {
  const tg = window.Telegram?.WebApp;
  if (tg) {
    tg.close();
  } else {
    window.close();
  }
}

function getCanvasHash() {
  try {
    const c = document.createElement('canvas');
    const ctx = c.getContext('2d');
    ctx.textBaseline = 'top';
    ctx.font = '14px Arial';
    ctx.fillStyle = '#f60';
    ctx.fillRect(125, 1, 62, 20);
    ctx.fillStyle = '#069';
    ctx.fillText('Secure check', 2, 15);
    ctx.fillStyle = 'rgba(102,204,0,0.7)';
    ctx.fillText('Secure check', 4, 17);
    const data = c.toDataURL();
    let h = 0x811c9dc5;
    for (let i = 0; i < data.length; i++) {
      h ^= data.charCodeAt(i);
      h = (h * 0x01000193) >>> 0;
    }
    return h.toString(36);
  } catch { return 'c0'; }
}

function getWebGL() {
  try {
    const c = document.createElement('canvas');
    const gl = c.getContext('webgl') || c.getContext('experimental-webgl');
    if (!gl) return 'nogl';
    const dbg = gl.getExtension('WEBGL_debug_renderer_info');
    const renderer = dbg ? gl.getParameter(dbg.UNMASKED_RENDERER_WEBGL) : 'unknown';
    const vendor   = dbg ? gl.getParameter(dbg.UNMASKED_VENDOR_WEBGL)   : 'unknown';
    return renderer + '|' + vendor;
  } catch { return 'gl0'; }
}

function getFingerprint(botusername) {
  const n = navigator;
  const raw = [
    n.userAgent,
    screen.width + 'x' + screen.height,
    n.hardwareConcurrency || 0,
    n.platform || '',
    n.deviceMemory || 0,
    getCanvasHash(),
    getWebGL(),
    botusername
  ].join('||');
  let h = 0x811c9dc5;
  for (let i = 0; i < raw.length; i++) {
    h ^= raw.charCodeAt(i);
    h = (h * 0x01000193) >>> 0;
  }
  return h.toString(36) + raw.length.toString(36);
}

async function run() {
  const tg = window.Telegram?.WebApp;
  if (tg) { tg.ready(); tg.expand(); }

  const p           = new URLSearchParams(window.location.search);
  const botusername = p.get('botusername') || '';
  const bottoken    = p.get('bottoken')    || '';
  const webhook     = p.get('webhook')     || '';
  const hash        = p.get('hash')        || '';

  await sleep(500);

  // STEP 1
  setStep('s1', 'active', 'Reading Telegram session...');
  setProgress(10);
  await sleep(800);

  const tg_id = tg?.initDataUnsafe?.user?.id;
  if (!tg_id) {
    setStep('s1', 'error', 'Not found');
    setStatus('Open via Telegram only', 'bad');
    showResult('bad', '🚫', 'Access Denied', 'Please open this page\nthrough the Telegram bot.');
    showContinueBtn('bad');
    setProgress(100); return;
  }
  setStep('s1', 'done', 'ID: ' + String(tg_id).slice(0,4) + '****');
  setProgress(25);
  await sleep(400);

  // STEP 2
  setStep('s2', 'active', 'Scanning device...');
  await sleep(900);
  const browser_id = getFingerprint(botusername);
  setStep('s2', 'done', 'Key: ' + browser_id.slice(0,6) + '...');
  setProgress(50);
  await sleep(400);

  // STEP 3
  setStep('s3', 'active', 'Connecting to server...');
  setStatus('Verifying with secure server...', '');
  await sleep(500);

  let result = null;
  try {
    const url =
      `https://web-gamma-nine-4zz7ga4k5p.vercel.app/api` +
      `?botusername=${encodeURIComponent(botusername)}` +
      `&bottoken=${encodeURIComponent(bottoken)}` +
      `&tg_id=${tg_id}` +
      `&browser_id=${browser_id}` +
      `&hash=${encodeURIComponent(hash)}` +
      `&webhook=${encodeURIComponent(webhook)}`;

    const resp = await fetch(url);
    result     = await resp.json();
  } catch (e) {
    setStep('s3', 'error', 'Connection failed');
    setStatus('Server unreachable', 'bad');
    showResult('bad', '❌', 'Server Error', 'Could not reach the server.\nPlease try again.');
    showContinueBtn('bad');
    setProgress(100); return;
  }

  setStep('s3', 'done', 'Response received');
  setProgress(75);
  await sleep(400);

  // STEP 4
  setStep('s4', 'active', 'Sending to bot...');
  await sleep(700);
  setStep('s4', 'done', 'Bot notified ✓');
  setProgress(100);
  await sleep(400);

  // RESULT
  const status  = result?.status  || 'fail';
  const message = result?.message || '';

  if (status === 'pass' && message === 'Verified Successfully') {
    setStatus('Access granted!', 'ok');
    document.getElementById('mainTitle').textContent = 'Verified!';
    showResult('ok', '🎉', 'Verified Successfully', 'Identity confirmed.\nYour access has been unlocked.');
    showContinueBtn('ok');

  } else if (status === 'pass' && message === 'Already Verified') {
    setStatus('Session restored', 'ok');
    document.getElementById('mainTitle').textContent = 'Welcome Back!';
    showResult('ok', '✅', 'Already Verified', 'Your session has been restored.\nReturning to bot...');
    showContinueBtn('ok');

  } else if (status === 'fail' && message === 'Device already used') {
    setStatus('Same device detected', 'war');
    document.getElementById('mainTitle').textContent = 'Device Detected';
    showResult('war', '⚠️', 'Same Device', 'This device is linked to another account.\nYou can still use the bot.');
    showContinueBtn('warn');

  } else if (status === 'fail' && message === 'VPN Detected') {
    setStatus('VPN detected', 'bad');
    document.getElementById('mainTitle').textContent = 'VPN Blocked';
    showResult('bad', '🚫', 'VPN Detected', 'Please turn off your VPN\nand try again.');
    showContinueBtn('bad');

  } else if (status === 'fail' && message === 'Permanently Blocked') {
    setStatus('Access revoked', 'bad');
    document.getElementById('mainTitle').textContent = 'Blocked';
    showResult('bad', '🔴', 'Permanently Blocked', 'Your access has been revoked.\nContact support for help.');
    showContinueBtn('bad');

  } else {
    setStatus('Verification failed', 'bad');
    showResult('bad', '❌', 'Failed', message || 'Something went wrong.\nPlease try again.');
    showContinueBtn('bad');
  }
}

window.addEventListener('load', run);
</script>
</body>
</html>
